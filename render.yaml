services:
  - type: web
    name: apex-pulse
    env: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        value: file:/app/data/prod.db
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: NODE_ENV
        value: production
    disk:
      name: apexdata
      mountPath: /app/data
      sizeGB: 1
