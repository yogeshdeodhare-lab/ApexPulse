apiVersion: apps/v1
kind: Deployment
metadata:
  name: apex-pulse
  namespace: apex-pulse
  labels:
    app: apex-pulse
spec:
  replicas: 2
  selector:
    matchLabels:
      app: apex-pulse
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: apex-pulse
    spec:
      # Run as non-root for security
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001

      initContainers:
        # Run migrations before the app starts
        - name: migrate
          image: apex-pulse:latest
          imagePullPolicy: Always
          command: ["npx", "prisma", "migrate", "deploy"]
          envFrom:
            - configMapRef:
                name: apex-pulse-config
            - secretRef:
                name: apex-pulse-secret

      containers:
        - name: apex-pulse
          image: apex-pulse:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: apex-pulse-config
            - secretRef:
                name: apex-pulse-secret
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
