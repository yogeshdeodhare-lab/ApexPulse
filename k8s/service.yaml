apiVersion: v1
kind: Service
metadata:
  name: apex-pulse-svc
  namespace: apex-pulse
  labels:
    app: apex-pulse
spec:
  selector:
    app: apex-pulse
  ports:
    - name: http
      port: 80
      targetPort: 3000
      protocol: TCP
  type: ClusterIP
---
# Ingress — adjust annotations for your ingress controller (nginx shown here)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: apex-pulse-ingress
  namespace: apex-pulse
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  rules:
    - host: apex-pulse.yourcompany.internal
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: apex-pulse-svc
                port:
                  number: 80
  tls:
    - hosts:
        - apex-pulse.yourcompany.internal
      secretName: apex-pulse-tls
