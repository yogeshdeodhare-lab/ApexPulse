# ─────────────────────────────────────────────────────────────────────────────
# APEX Pulse — Kubernetes Secret Template
# DO NOT commit real values. Fill placeholders and apply with:
#   kubectl apply -f k8s/secret.yaml
# Or use Sealed Secrets / External Secrets Operator for GitOps workflows.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: apex-pulse-secret
  namespace: apex-pulse
type: Opaque
stringData:
  # Required
  DATABASE_URL: "postgresql://apexpulse:CHANGE_ME@postgres-svc:5432/apexpulse?schema=public"
  NEXTAUTH_SECRET: "CHANGE_ME_use_openssl_rand_base64_32"

  # Bootstrap admin (used until DB users are created)
  ADMIN_EMAIL: "admin@yourcompany.com"
  ADMIN_PASSWORD: "CHANGE_ME"

  # Optional — AI provider keys
  ANTHROPIC_API_KEY: ""
  OPENAI_API_KEY: ""
  GOOGLE_API_KEY: ""
  AZURE_OPENAI_API_KEY: ""
  AZURE_OPENAI_ENDPOINT: ""
  AWS_ACCESS_KEY_ID: ""
  AWS_SECRET_ACCESS_KEY: ""

  # Optional — webhooks
  SLACK_WEBHOOK_URL: ""
  ALERT_WEBHOOK_URL: ""

  # Optional — GitHub OAuth
  GITHUB_CLIENT_ID: ""
  GITHUB_CLIENT_SECRET: ""
  GITHUB_TOKEN: ""
