version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# APEX Pulse — Enterprise Production Stack
# PostgreSQL + Next.js app + Nginx TLS termination
#
# Usage:
#   cp .env.example .env
#   # fill in all required vars (NEXTAUTH_SECRET, POSTGRES_PASSWORD, etc.)
#   docker compose -f docker-compose.pg.yml up -d
#
# Required env vars (no defaults — deployment fails if missing):
#   POSTGRES_PASSWORD, NEXTAUTH_SECRET, ADMIN_PASSWORD, NEXTAUTH_URL
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       apex_pulse
      POSTGRES_USER:     ${POSTGRES_USER:-apex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-apex} -d apex_pulse"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - apex-internal

  # ── Application ─────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL:          "postgresql://${POSTGRES_USER:-apex}:${POSTGRES_PASSWORD}@db:5432/apex_pulse?sslmode=disable"
      NEXTAUTH_URL:          ${NEXTAUTH_URL:?NEXTAUTH_URL is required (e.g. https://your-domain.com)}
      NEXTAUTH_SECRET:       ${NEXTAUTH_SECRET:?NEXTAUTH_SECRET is required}
      ADMIN_EMAIL:           ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD:        ${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
      NEXT_PUBLIC_AUTH_ENABLED: "1"
      ANTHROPIC_API_KEY:     ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY:        ${OPENAI_API_KEY:-}
      GOOGLE_API_KEY:        ${GOOGLE_API_KEY:-}
      AZURE_OPENAI_API_KEY:  ${AZURE_OPENAI_API_KEY:-}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-}
      AWS_ACCESS_KEY_ID:     ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION:            ${AWS_REGION:-us-east-1}
      GITHUB_CLIENT_ID:      ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET:  ${GITHUB_CLIENT_SECRET:-}
      NEXT_PUBLIC_GITHUB_OAUTH_ENABLED: ${NEXT_PUBLIC_GITHUB_OAUTH_ENABLED:-}
      SLACK_WEBHOOK_URL:     ${SLACK_WEBHOOK_URL:-}
      ALERT_WEBHOOK_URL:     ${ALERT_WEBHOOK_URL:-}
      RATE_LIMIT_RPM:        ${RATE_LIMIT_RPM:-120}
      NODE_ENV:              production
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - apex-internal

  # ── Nginx TLS termination ───────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro             # mount your TLS certs here
      - certbot-www:/var/www/certbot:ro            # Let's Encrypt ACME challenge
    depends_on:
      - app
    networks:
      - apex-internal
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 60s
      timeout: 5s
      retries: 3

volumes:
  pgdata:
    driver: local
  certbot-www:
    driver: local

networks:
  apex-internal:
    driver: bridge
    internal: false  # app & db are only reachable via nginx from outside
